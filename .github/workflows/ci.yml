name: CI

on:
  push:
    paths:
      - 'fake_rlimit.c'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'fake_rlimit.c'
      - 'tests/**'
      - '.github/workflows/ci.yml'

jobs:
  build-shim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: gcc -shared -fPIC -O2 -Wall -Wextra -Werror -o libfake_rlimit.so fake_rlimit.c -ldl
      - run: bash tests/test.sh
